{% extends 'base.html' %}

{% block title %}Edit Booking {{ booking.id }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-slate-800 mb-4">Edit Booking #<span class="text-blue-600">{{ booking.id }}</span></h2>
        
        <div class="mb-6 p-4 bg-slate-50 rounded-md border border-slate-200 space-y-2">
            <p><strong class="font-medium text-slate-600">User:</strong> {{ booking.user.username }}</p>
            <p><strong class="font-medium text-slate-600">Spot:</strong> {{ booking.spot.spot_number }}</p>
            <p><strong class="font-medium text-slate-600">Cost:</strong> ₹{{ "%.2f"|format(booking.total_cost) }}</p>
        </div>

        <form method="post" class="space-y-6">
            <div>
                <label for="status" class="block text-sm font-medium text-slate-700">Booking Status</label>
                <div class="mt-1">
                    <select id="status" name="status" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="Confirmed" {% if booking.status == 'Confirmed' %}selected{% endif %}>Confirmed</option>
                        <option value="Occupied" {% if booking.status == 'Occupied' %}selected{% endif %}>Occupied</option>
                        <option value="Completed" {% if booking.status == 'Completed' %}selected{% endif %}>Completed</option>
                        <option value="Paid" {% if booking.status == 'Paid' %}selected{% endif %}>Paid</option>
                        <option value="Cancelled" {% if booking.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Update Booking
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
