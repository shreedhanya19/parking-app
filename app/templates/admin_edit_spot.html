{% extends 'base.html' %}

{% block title %}{{ 'Edit' if spot else 'Add' }} Spot{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">{{ 'Edit' if spot else 'Add' }} Parking Spot</h2>
        <form method="post" class="space-y-6">
            <div>
                <label for="spot_number" class="block text-sm font-medium text-slate-700">Spot Number</label>
                <div class="mt-1">
                    <input id="spot_number" name="spot_number" type="text" value="{{ spot.spot_number if spot else '' }}" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
            </div>

            <div>
                <label for="spot_type" class="block text-sm font-medium text-slate-700">Spot Type</label>
                <div class="mt-1">
                    <input id="spot_type" name="spot_type" type="text" value="{{ spot.spot_type if spot else 'Compact' }}" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
            </div>

            <div>
                <label for="hourly_rate" class="block text-sm font-medium text-slate-700">Hourly Rate (₹)</label>
                <div class="mt-1">
                    <input id="hourly_rate" name="hourly_rate" type="number" step="0.01" value="{{ spot.hourly_rate if spot else '10.00' }}" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
            </div>

            <div class="flex items-center">
                <input id="is_available" name="is_available" type="checkbox" {% if spot and spot.is_available %}checked{% endif %} class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded">
                <label for="is_available" class="ml-2 block text-sm text-slate-900">Is Available</label>
            </div>
            
            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Save Spot
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
